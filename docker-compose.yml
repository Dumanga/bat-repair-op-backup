services:
  mysql:
    image: mysql:8.0
    container_name: ops_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ROOT_PASS_CHANGE_ME
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: Dumanga_25
    volumes:
      - /home/dev/apps/ops/docker/mysql/data:/var/lib/mysql
      - /home/dev/apps/ops/docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - opsnet

  web:
    build: .
    container_name: ops_web
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - mysql
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - opsnet

networks:
  opsnet:
    driver: bridge
